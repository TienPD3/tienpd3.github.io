<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N0 Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to right top, #65dfc9, #6cdbeb);
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 1024px;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }
        .card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            cursor: pointer;
            min-height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            line-height: 1.5;
            perspective: 1000px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            align-items: center;
            box-sizing: border-box;
            color: #333;
        }
        .card-face-back {
            transform: rotateY(180deg);
            color: #1a5fb4;
            font-weight: 500;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            align-items: center;
        }
        button {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.85);
            color: #333;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            background-color: white;
        }
        button:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        #flipBtn {
            background-color: #ffdd57;
            font-weight: 700;
        }
        #flipBtn:hover {
             background-color: #ffeb99;
        }
        #counter {
            font-size: 1.2rem;
            color: white;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            margin: 1rem 0 0 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>N0 Vocabulary Quiz</h1>
        <div class="card" id="flashcard">
            <div class="card-inner">
                <div class="card-face card-face-front" id="card-front"></div>
                <div class="card-face card-face-back" id="card-back"></div>
            </div>
        </div>
        <div class="controls">
            <button id="prevBtn">Previous</button>
            <button id="flipBtn">Flip</button>
            <button id="nextBtn">Next</button>
        </div>
        <div id="counter"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.getElementById('flashcard');
            const cardFront = document.getElementById('card-front');
            const cardBack = document.getElementById('card-back');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const flipBtn = document.getElementById('flipBtn');
            const counterEl = document.getElementById('counter');

            let data = [];
            let currentIndex = 0;

            fetch('../assets/storage/n0.json')
                .then(response => response.json())
                .then(jsonData => {
                    data = jsonData;
                    if (data.length > 0) {
                        displayCard(currentIndex);
                    }
                })
                .catch(error => {
                    console.error('Error fetching JSON:', error);
                    cardFront.innerHTML = 'Error loading data.';
                });

            function displayCard(index) {
                const item = data[index];
                cardFront.innerHTML = item.furigana_html;
                cardBack.textContent = item.vn;
                card.classList.remove('is-flipped');
                counterEl.textContent = `${index + 1} / ${data.length}`;
            }

            function flipCard() {
                card.classList.toggle('is-flipped');
            }

            function nextCard() {
                currentIndex = (currentIndex + 1) % data.length;
                displayCard(currentIndex);
            }

            function prevCard() {
                currentIndex = (currentIndex - 1 + data.length) % data.length;
                displayCard(currentIndex);
            }
            
            card.addEventListener('click', flipCard);
            flipBtn.addEventListener('click', flipCard);
            nextBtn.addEventListener('click', nextCard);
            prevBtn.addEventListener('click', prevCard);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') {
                    nextCard();
                } else if (e.key === 'ArrowLeft') {
                    prevCard();
                } else if (e.key === ' ' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    flipCard();
                }
            });
        });
    </script>

</body>
</html>
