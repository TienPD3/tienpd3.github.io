<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình xem câu hỏi (Cấu trúc mới)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        #quiz-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .problem-block {
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
            padding-bottom: 20px;
        }
        .problem-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #0056b3;
            margin-bottom: 10px;
        }
        .problem-title-trans {
            font-size: 1em;
            color: #666;
            margin-bottom: 20px;
            display: none; /* Hide by default */
        }
        .sub-question {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .passage {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .passage-trans {
            font-size: 0.9em;
            color: #555;
            font-style: italic;
            border-left: 3px solid #ccc;
            padding-left: 10px;
            display: none; /* Hide by default */
        }
        .question {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .option:hover {
            background-color: #f0f0f0;
        }
        .option.correct-answer {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
            font-weight: bold;
        }
        .option.wrong-answer {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .show-answer-btn {
            padding: 8px 15px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        .show-answer-btn:disabled {
            background-color: #aaa;
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <h1>Trình xem câu hỏi (Cấu trúc mới)</h1>
        <p>Đang tải dữ liệu...</p>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        let originalData = null; // To store the fetched data

        // Function to shuffle an array (Fisher-Yates)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex > 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [
                array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        fetch('../assets/storage/gramma_quiz_nested.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok ' + response.statusText);
                }
                return response.json();
            })
            .then(data => {
                originalData = data; // Store the original data
                const container = document.getElementById('quiz-container');
                const loadingText = container.querySelector('p');
                if(loadingText) loadingText.remove();

                const h1 = container.querySelector('h1');

                // Add checkbox HTML
                const optionsBar = document.createElement('div');
                optionsBar.style.margin = '20px 0';
                optionsBar.style.padding = '10px';
                optionsBar.style.border = '1px solid #ddd';
                optionsBar.style.borderRadius = '5px';
                optionsBar.innerHTML = `
                    <label for="randomize-checkbox" style="cursor: pointer; user-select: none;">
                        <input type="checkbox" id="randomize-checkbox" style="vertical-align: middle;">
                        Randomize Answers
                    </label>
                `;
                h1.insertAdjacentElement('afterend', optionsBar);

                const randomizeCheckbox = document.getElementById('randomize-checkbox');

                // Initial render
                renderQuiz(originalData, randomizeCheckbox.checked);

                // Add event listener to re-render on change
                randomizeCheckbox.addEventListener('change', () => {
                    renderQuiz(originalData, randomizeCheckbox.checked);
                });
            })
            .catch(error => {
                console.error('There has been a problem with your fetch operation:', error);
                const container = document.getElementById('quiz-container');
                container.innerHTML = '<h1>Lỗi</h1><p>Không thể tải dữ liệu câu hỏi.</p>';
            });

        function renderQuiz(problems, randomize = false) {
            const container = document.getElementById('quiz-container');
            
            // Clear existing quiz blocks but not the title and options bar
            const existingProblems = container.querySelectorAll('.problem-block');
            existingProblems.forEach(p => p.remove());

            problems.forEach((problem, problemIndex) => {
                const problemBlock = document.createElement('div');
                problemBlock.className = 'problem-block';

                const problemTitle = document.createElement('h2');
                problemTitle.className = 'problem-title';
                problemTitle.textContent = problem.problem_title;
                problemBlock.appendChild(problemTitle);

                if (problem.translation && problem.translation.problem_title) {
                    const problemTitleTrans = document.createElement('p');
                    problemTitleTrans.className = 'problem-title-trans';
                    problemTitleTrans.textContent = problem.translation.problem_title;
                    problemBlock.appendChild(problemTitleTrans);
                }

                let lastPassage = null;

                problem.sub_questions.forEach((sq, sqIndex) => {
                    const subQuestionDiv = document.createElement('div');
                    subQuestionDiv.className = 'sub-question';
                    subQuestionDiv.id = `problem-${problemIndex}-sq-${sqIndex}`;

                    if (sq.passage && sq.passage !== lastPassage) {
                        const passageDiv = document.createElement('div');
                        passageDiv.className = 'passage';
                        passageDiv.textContent = sq.passage;
                        
                        if(sq.translation && sq.translation.passage) {
                            const passageTrans = document.createElement('p');
                            passageTrans.className = 'passage-trans';
                            passageTrans.textContent = sq.translation.passage;
                            passageDiv.innerHTML += '<hr>';
                            passageDiv.appendChild(passageTrans);
                        }
                        
                        subQuestionDiv.appendChild(passageDiv);
                        lastPassage = sq.passage;
                    }

                    const questionP = document.createElement('p');
                    questionP.className = 'question';
                    questionP.textContent = sq.question;
                    subQuestionDiv.appendChild(questionP);

                    if (sq.translation && sq.translation.question) {
                        const questionTransP = document.createElement('p');
                        questionTransP.className = 'passage-trans';
                        questionTransP.textContent = sq.translation.question;
                        subQuestionDiv.appendChild(questionTransP);
                    }

                    const optionsContainer = document.createElement('div');
                    optionsContainer.className = 'options-container';

                    let hasAnswered = false;
                    const options = randomize ? shuffle([...sq.options]) : sq.options;

                    options.forEach((optionText, optionIndex) => {
                        const optionDiv = document.createElement('div');
                        optionDiv.className = 'option';
                        optionDiv.dataset.option = optionText;

                        let optionTranslation = '';
                        if (sq.translation && sq.translation.options && sq.translation.options[optionText]) {
                            optionTranslation = sq.translation.options[optionText];
                        }
                        
                        optionDiv.innerHTML = `${optionText} <span class="passage-trans">(${optionTranslation})</span>`;
                        
                        optionDiv.addEventListener('click', () => {
                            if (hasAnswered) return;
                            hasAnswered = true;

                            // Show translations for this sub-question
                            const transElements = subQuestionDiv.querySelectorAll('.passage-trans');
                            transElements.forEach(el => {
                                el.style.display = el.tagName === 'P' ? 'block' : 'inline';
                            });

                            // Also show title translation
                            const problemBlock = subQuestionDiv.closest('.problem-block');
                            const titleTrans = problemBlock.querySelector('.problem-title-trans');
                            if (titleTrans) titleTrans.style.display = 'block';

                            // Mark answers and disable options
                            optionsContainer.querySelectorAll('.option').forEach(opt => {
                                opt.style.pointerEvents = 'none'; // Disable further clicks
                                 const optTrans = opt.querySelector('.passage-trans');
                                if (optTrans) optTrans.style.display = 'inline';

                                if (opt.dataset.option === sq.correctAnswer) {
                                    opt.classList.add('correct-answer');
                                }
                            });

                            // Mark the selected option if it's wrong
                            if (optionDiv.dataset.option !== sq.correctAnswer) {
                                optionDiv.classList.add('wrong-answer');
                            }
                        }, { once: true });


                        optionsContainer.appendChild(optionDiv);
                    });

                    subQuestionDiv.appendChild(optionsContainer);
                    problemBlock.appendChild(subQuestionDiv);
                });

                container.appendChild(problemBlock);
            });
        }
    });
    </script>

</body>
</html>
