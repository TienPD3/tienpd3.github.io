#SachTinhGon
Sachtomtatntc = type=http-response,pattern=^https?://sachtomtatntc\.com/v2/subscriptions/user,requires-body=1,max-size=0,script-path=https://raw.githubusercontent.com/TienPD3/tienpd3.github.io/refs/heads/main/Shadownrocket/Purchased/SachTinhGon/Sachtomtatntc.js

#YouTube Premium
youtube.request = type=http-request,pattern=^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|reel\/reel_watch_sequence|get_watch),requires-body=1,max-size=-1,binary-body-mode=1,engine=jsc,script-path=https://raw.githubusercontent.com/TienPD3/tienpd3.github.io/refs/heads/main/Shadownrocket/Purchased/YoutubePremium/youtube.response.js
youtube.response = type=http-response,pattern=^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch),requires-body=1,max-size=-1,binary-body-mode=1,script-path=https://raw.githubusercontent.com/TienPD3/tienpd3.github.io/refs/heads/main/Shadownrocket/Purchased/YoutubePremium/youtube.response.js,argument="{"lyricLang":"vi","captionLang":"vi","blockUpload":true,"blockImmersive":true,"debug":false}"

